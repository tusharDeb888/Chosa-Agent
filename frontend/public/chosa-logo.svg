<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Green 4-pointed star (diamond) -->
  <g transform="translate(30, 30)">
    <!-- Main green diamond shape -->
    <path d="M0 -22 L8 -4 L0 22 L-8 -4 Z" fill="url(#greenGrad)" />
    <path d="M-22 0 L-4 -8 L22 0 L-4 8 Z" fill="url(#greenGrad)" />
    <!-- Inner glow -->
    <circle cx="0" cy="0" r="4" fill="#a3e635" opacity="0.6"/>
  </g>
  
  <!-- Small red 4-pointed star -->
  <g transform="translate(52, 12)">
    <path d="M0 -6 L2 -1 L0 6 L-2 -1 Z" fill="#ef4444"/>
    <path d="M-6 0 L-1 -2 L6 0 L-1 2 Z" fill="#ef4444"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
</svg>
